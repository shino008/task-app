                                            type="text"
                                            required
                                            value={newTaskTitle}
                                            onChange={(e) => setNewTaskTitle(e.target.value)}
                                            placeholder="例: 新しいロゴのデザイン"
                                            className="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl p-4 text-sm font-semibold focus:ring-2 ring-blue-500/50 dark:text-white outline-none transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-zinc-500 dark:text-zinc-400">納期 (締切日)</label>
                                        <input
                                            type="date"
                                            required
                                            value={newTaskEndDate}
                                            onChange={(e) => setNewTaskEndDate(e.target.value)}
                                            className="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl p-4 text-sm font-semibold focus:ring-2 ring-blue-500/50 dark:text-white outline-none transition-all"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-zinc-500 dark:text-zinc-400">ステータス</label>
                                        <select
                                            value={newTaskStatus}
                                            onChange={(e) => setNewTaskStatus(e.target.value)}
                                            className="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl p-4 text-sm font-semibold focus:ring-2 ring-blue-500/50 dark:text-white outline-none transition-all appearance-none"
                                        >
                                            <option value="Not Started">未着手 (Not Started)</option>
                                            <option value="Active">制作中 (Active)</option>
                                            <option value="Waiting">確認待ち (Waiting)</option>
                                            <option value="Completed">完了 (Completed)</option>
                                        </select>
                                    </div>
                                    <button
                                        type="submit"
                                        className="w-full mt-2 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl py-4 font-bold shadow-lg shadow-blue-500/30 transition-all active:scale-95"
                                    >
                                        追加する
                                    </button>
                                </form>

                                <div className="pt-4 border-t border-zinc-200 dark:border-zinc-800">
                                    <p className="text-xs font-bold text-zinc-400 text-center mb-4">またはテンプレートから作成</p>
                                    <div className="grid grid-cols-2 gap-3">
                                        {TEMPLATES.map(template => (
                                            <button
                                                key={template.id}
                                                type="button"
                                                onClick={() => addTaskFromTemplate(template)}
                                                className="flex flex-col items-center gap-2 p-3 rounded-2xl bg-zinc-50 dark:bg-zinc-800 hover:bg-blue-50 hover:scale-[1.02] active:scale-95 transition-all border border-zinc-100 hover:border-blue-200 shadow-sm"
                                            >
                                                <div className={`w-10 h-10 rounded-xl ${template.color} text-white flex items-center justify-center text-lg shadow-sm`}>
                                                    {template.icon}
                                                </div>
                                                <span className="text-[10px] font-black text-zinc-600 uppercase tracking-tight">{template.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <style>{`
            @keyframes fadeIn {
              from { opacity: 0; }
              to { opacity: 1; }
            }
            @keyframes slideUp {
              from { transform: translateY(100%); opacity: 0; }
              to { transform: translateY(0); opacity: 1; }
            }
            @keyframes zoomIn {
              from { transform: scale(0.95); opacity: 0; }
              to { transform: scale(1); opacity: 1; }
            }
          `}</style>
                </div>
            );
        };

        const NavItem = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`relative flex flex-col items-center justify-center w-16 h-full transition-all duration-300 ${active ? 'text-blue-600' : 'text-zinc-400 hover:text-zinc-500'}`}>
                <div className={`relative transition-transform duration-300 ${active ? '-translate-y-2' : ''}`}>
                    {icon}
                </div>
                <span className={`absolute bottom-3 text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${active ? 'opacity-100 transform translate-y-0' : 'opacity-0 transform translate-y-2'}`}>{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
